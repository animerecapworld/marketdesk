<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" role="img" aria-label="Time frame ladder">
  <rect width="980" height="620" fill="#f6f2ea" />
  <rect x="52" y="56" width="876" height="508" rx="24" fill="#fffdf9" stroke="#d9ccb8" stroke-width="3" />
  <text x="88" y="118" fill="#1d1d1d" font-family="Georgia, serif" font-size="34" font-weight="700">Time Frame Ladder</text>
  <text x="88" y="154" fill="#6c645a" font-family="Arial, sans-serif" font-size="20">Use a broad frame for context, a middle frame for structure, and a smaller frame for execution.</text>

  <g font-family="Arial, sans-serif">
    <rect x="112" y="208" width="756" height="78" rx="18" fill="#f7efe0" stroke="#d4c19e" stroke-width="2.5" />
    <text x="140" y="242" fill="#2a2014" font-size="22" font-weight="700">Context frame: daily or four-hour</text>
    <text x="140" y="270" fill="#5e5448" font-size="18">Trend, major zones, event risk, higher-time-frame bias</text>

    <rect x="148" y="314" width="684" height="78" rx="18" fill="#f7efe0" stroke="#d4c19e" stroke-width="2.5" />
    <text x="176" y="348" fill="#2a2014" font-size="22" font-weight="700">Operating frame: one-hour or fifteen-minute</text>
    <text x="176" y="376" fill="#5e5448" font-size="18">Structure, acceptance and rejection, setup location</text>

    <rect x="188" y="420" width="604" height="78" rx="18" fill="#f7efe0" stroke="#d4c19e" stroke-width="2.5" />
    <text x="216" y="454" fill="#2a2014" font-size="22" font-weight="700">Execution frame: five-minute or lower</text>
    <text x="216" y="482" fill="#5e5448" font-size="18">Entry trigger, order choice, stop placement</text>
  </g>

  <path d="M490 286V314M490 392V420" stroke="#b89254" stroke-width="5" stroke-linecap="round" />
</svg>
