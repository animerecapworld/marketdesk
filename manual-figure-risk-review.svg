<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Review loop for free and testnet activity</title>
  <desc id="desc">A dark themed review loop diagram showing how to screen an opportunity, participate carefully, document it, and review whether it was worth repeating.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101620" />
      <stop offset="100%" stop-color="#090d14" />
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#171f2b" />
      <stop offset="100%" stop-color="#0d131c" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>
  <rect width="960" height="540" rx="32" fill="url(#bg)" />
  <text x="54" y="70" fill="#f3efe6" font-family="Manrope, sans-serif" font-size="24" font-weight="800">Participation Review Loop</text>
  <text x="54" y="102" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="16">Screen - act lightly - log - review - repeat only if it still makes sense</text>
  <g filter="url(#shadow)">
    <circle cx="240" cy="270" r="86" fill="url(#panel)" stroke="#304051" />
    <circle cx="480" cy="170" r="86" fill="url(#panel)" stroke="#304051" />
    <circle cx="720" cy="270" r="86" fill="url(#panel)" stroke="#304051" />
    <circle cx="480" cy="370" r="86" fill="url(#panel)" stroke="#304051" />
  </g>
  <text x="194" y="258" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="14" font-weight="800">SCREEN</text>
  <text x="166" y="292" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="28">Check source</text>
  <text x="432" y="158" fill="#74c6bb" font-family="Manrope, sans-serif" font-size="14" font-weight="800">ACT</text>
  <text x="392" y="192" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="28">Use small risk</text>
  <text x="668" y="258" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="14" font-weight="800">LOG</text>
  <text x="640" y="292" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="28">Save proof</text>
  <text x="426" y="358" fill="#74c6bb" font-family="Manrope, sans-serif" font-size="14" font-weight="800">REVIEW</text>
  <text x="402" y="392" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="28">Keep or drop</text>
  <path d="M326 236 C360 210 392 192 426 182" stroke="#d2b27a" stroke-width="6" fill="none" stroke-linecap="round" />
  <path d="M566 182 C598 192 632 210 666 236" stroke="#74c6bb" stroke-width="6" fill="none" stroke-linecap="round" />
  <path d="M666 304 C632 330 598 348 566 358" stroke="#d2b27a" stroke-width="6" fill="none" stroke-linecap="round" />
  <path d="M426 358 C394 348 360 330 326 304" stroke="#74c6bb" stroke-width="6" fill="none" stroke-linecap="round" />
</svg>
