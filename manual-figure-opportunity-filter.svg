<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Opportunity filter scoring matrix</title>
  <desc id="desc">A dark themed score matrix showing source quality, time cost, wallet risk, and expected value for evaluating free opportunities.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101620" />
      <stop offset="100%" stop-color="#090d14" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>
  <rect width="960" height="540" rx="32" fill="url(#bg)" />
  <text x="54" y="70" fill="#f3efe6" font-family="Manrope, sans-serif" font-size="24" font-weight="800">Free Opportunity Filter</text>
  <text x="54" y="102" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="16">Screen before you participate: source quality, time cost, wallet risk, expected value</text>
  <g filter="url(#shadow)">
    <rect x="72" y="146" width="816" height="314" rx="28" fill="#101722" stroke="#304051" />
    <rect x="72" y="146" width="816" height="58" rx="28" fill="#151d29" />
    <text x="110" y="183" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="15" font-weight="800">CATEGORY</text>
    <text x="422" y="183" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="15" font-weight="800">LOW RISK / HIGH QUALITY</text>
    <text x="696" y="183" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="15" font-weight="800">WARNING</text>
    <g fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="30">
      <text x="110" y="256">Source quality</text>
      <text x="110" y="322">Time cost</text>
      <text x="110" y="388">Wallet risk</text>
      <text x="110" y="454">Expected value</text>
    </g>
    <g fill="#a4adbc" font-family="Manrope, sans-serif" font-size="15">
      <text x="422" y="252">Official docs, verified channels</text>
      <text x="422" y="318">Short, clear task set</text>
      <text x="422" y="384">Read-only or standard low-risk actions</text>
      <text x="422" y="450">Reasonable, uncertain upside</text>
      <text x="696" y="252">Rumors, private messages, copycats</text>
      <text x="696" y="318">Constant upkeep for unclear reward</text>
      <text x="696" y="384">Wide approvals or strange wallet prompts</text>
      <text x="696" y="450">Guaranteed language or hype-only promises</text>
    </g>
    <path d="M92 274 H868" stroke="#2d3948" />
    <path d="M92 340 H868" stroke="#2d3948" />
    <path d="M92 406 H868" stroke="#2d3948" />
    <path d="M356 204 V460" stroke="#2d3948" />
    <path d="M668 204 V460" stroke="#2d3948" />
  </g>
</svg>
