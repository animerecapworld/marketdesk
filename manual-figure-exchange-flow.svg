<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Exchange setup workflow diagram</title>
  <desc id="desc">A dark themed diagram of exchange setup covering registration, account security, deposit testing, and order execution awareness.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101620" />
      <stop offset="100%" stop-color="#090d14" />
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#171f2b" />
      <stop offset="100%" stop-color="#0d131c" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>
  <rect width="960" height="540" rx="32" fill="url(#bg)" />
  <text x="54" y="70" fill="#f3efe6" font-family="Manrope, sans-serif" font-size="24" font-weight="800">Exchange Setup Workflow</text>
  <text x="54" y="102" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="16">Registration - security stack - test transfer - order discipline</text>
  <g filter="url(#shadow)">
    <rect x="54" y="146" width="256" height="136" rx="22" fill="url(#panel)" stroke="#304051" />
    <text x="80" y="186" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="14" font-weight="800">LAYER 1</text>
    <text x="80" y="220" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="32">Clean registration</text>
    <text x="80" y="254" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="15">Controlled email, official domain, and documented onboarding path.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="352" y="146" width="256" height="136" rx="22" fill="url(#panel)" stroke="#304051" />
    <text x="378" y="186" fill="#74c6bb" font-family="Manrope, sans-serif" font-size="14" font-weight="800">LAYER 2</text>
    <text x="378" y="220" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="32">Security stack</text>
    <text x="378" y="254" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="15">Unique password, 2FA, anti-phishing settings, and session review.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="650" y="146" width="256" height="136" rx="22" fill="url(#panel)" stroke="#304051" />
    <text x="676" y="186" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="14" font-weight="800">LAYER 3</text>
    <text x="676" y="220" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="32">Move funds carefully</text>
    <text x="676" y="254" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="15">Verify address and network. Use a small test transfer first.</text>
  </g>
  <path d="M310 214 H352" stroke="#d2b27a" stroke-width="6" stroke-linecap="round" />
  <path d="M608 214 H650" stroke="#74c6bb" stroke-width="6" stroke-linecap="round" />
  <g filter="url(#shadow)">
    <rect x="86" y="340" width="784" height="130" rx="24" fill="#121925" stroke="#304051" />
    <text x="120" y="380" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="14" font-weight="800">EXECUTION NOTE</text>
    <text x="120" y="414" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="31">Order type discipline matters after setup</text>
    <text x="120" y="448" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="15">Market orders prioritize speed, limit orders prioritize price, and transfer records should be saved for later review.</text>
  </g>
</svg>
