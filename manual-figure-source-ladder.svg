<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Opportunity credibility ladder</title>
  <desc id="desc">A dark themed ladder diagram ranking opportunity sources from official documentation at the top to anonymous hype at the bottom.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101620" />
      <stop offset="100%" stop-color="#090d14" />
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#171f2b" />
      <stop offset="100%" stop-color="#0d131c" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>
  <rect width="960" height="540" rx="32" fill="url(#bg)" />
  <text x="54" y="70" fill="#f3efe6" font-family="Manrope, sans-serif" font-size="24" font-weight="800">Opportunity Credibility Ladder</text>
  <text x="54" y="102" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="16">Move upward before you commit time or wallet exposure</text>
  <g filter="url(#shadow)">
    <rect x="218" y="124" width="524" height="72" rx="20" fill="url(#panel)" stroke="#304051" />
    <text x="248" y="154" fill="#74c6bb" font-family="Manrope, sans-serif" font-size="13" font-weight="800">TOP TIER</text>
    <text x="248" y="182" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="28">Official docs and verified channels</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="248" y="220" width="464" height="72" rx="20" fill="url(#panel)" stroke="#304051" />
    <text x="278" y="250" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="13" font-weight="800">MID TIER</text>
    <text x="278" y="278" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="28">Tracked public announcements and repeatable proof</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="278" y="316" width="404" height="72" rx="20" fill="url(#panel)" stroke="#304051" />
    <text x="308" y="346" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="13" font-weight="800">LOWER TIER</text>
    <text x="308" y="374" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="28">Community echo without primary proof</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="308" y="412" width="344" height="72" rx="20" fill="url(#panel)" stroke="#304051" />
    <text x="338" y="442" fill="#ff8e8e" font-family="Manrope, sans-serif" font-size="13" font-weight="800">SKIP ZONE</text>
    <text x="338" y="470" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="28">Anonymous hype and rush links</text>
  </g>
</svg>
