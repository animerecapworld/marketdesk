<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Network and gas verification diagram</title>
  <desc id="desc">A dark themed diagram showing the three checks before an on-chain action: correct network, gas reserve, and verified token details.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101620" />
      <stop offset="100%" stop-color="#090d14" />
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#171f2b" />
      <stop offset="100%" stop-color="#0d131c" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>
  <rect width="960" height="540" rx="32" fill="url(#bg)" />
  <text x="54" y="70" fill="#f3efe6" font-family="Manrope, sans-serif" font-size="24" font-weight="800">Network and Gas Check</text>
  <text x="54" y="102" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="16">Chain match - native token reserve - verified asset details</text>
  <g filter="url(#shadow)">
    <rect x="54" y="146" width="256" height="144" rx="22" fill="url(#panel)" stroke="#304051" />
    <text x="80" y="186" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="14" font-weight="800">CHECK 1</text>
    <text x="80" y="220" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="32">Right network</text>
    <text x="80" y="254" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="15">Confirm the wallet is on the intended chain before doing anything else.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="352" y="146" width="256" height="144" rx="22" fill="url(#panel)" stroke="#304051" />
    <text x="378" y="186" fill="#74c6bb" font-family="Manrope, sans-serif" font-size="14" font-weight="800">CHECK 2</text>
    <text x="378" y="220" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="32">Leave gas</text>
    <text x="378" y="254" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="15">Keep enough native token available so the next transaction can still clear.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="650" y="146" width="256" height="144" rx="22" fill="url(#panel)" stroke="#304051" />
    <text x="676" y="186" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="14" font-weight="800">CHECK 3</text>
    <text x="676" y="220" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="32">Verify token</text>
    <text x="676" y="254" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="15">Look at symbol, contract, and route details before a confirmation is signed.</text>
  </g>
  <path d="M310 218 H352" stroke="#d2b27a" stroke-width="6" stroke-linecap="round" />
  <path d="M608 218 H650" stroke="#74c6bb" stroke-width="6" stroke-linecap="round" />
  <g filter="url(#shadow)">
    <rect x="86" y="348" width="788" height="120" rx="24" fill="#121925" stroke="#304051" />
    <text x="120" y="388" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="14" font-weight="800">OPERATING RULE</text>
    <text x="120" y="422" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="30">If one layer is unclear, stop before signing</text>
    <text x="120" y="454" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="15">Most avoidable wallet mistakes happen because the user rushes the chain, gas, or token check.</text>
  </g>
</svg>
