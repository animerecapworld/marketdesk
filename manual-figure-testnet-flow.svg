<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Testnet participation workflow diagram</title>
  <desc id="desc">A dark themed diagram showing the sequence for safe testnet participation, from official docs to tracking completed tasks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f1520" />
      <stop offset="100%" stop-color="#090d14" />
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#171f2b" />
      <stop offset="100%" stop-color="#0e141d" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>
  <rect width="960" height="540" rx="32" fill="url(#bg)" />
  <text x="54" y="70" fill="#f3efe6" font-family="Manrope, sans-serif" font-size="24" font-weight="800">Testnet Participation Workflow</text>
  <text x="54" y="102" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="16">Docs - dedicated wallet - faucet - tasks - screenshots - review</text>
  <g filter="url(#shadow)">
    <rect x="54" y="150" width="140" height="104" rx="20" fill="url(#panel)" stroke="#314052" />
    <text x="76" y="188" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="13" font-weight="800">1</text>
    <text x="76" y="220" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="26">Official docs</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="214" y="150" width="140" height="104" rx="20" fill="url(#panel)" stroke="#314052" />
    <text x="236" y="188" fill="#74c6bb" font-family="Manrope, sans-serif" font-size="13" font-weight="800">2</text>
    <text x="236" y="220" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="26">Test wallet</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="374" y="150" width="140" height="104" rx="20" fill="url(#panel)" stroke="#314052" />
    <text x="396" y="188" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="13" font-weight="800">3</text>
    <text x="396" y="220" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="26">Faucet</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="534" y="150" width="140" height="104" rx="20" fill="url(#panel)" stroke="#314052" />
    <text x="556" y="188" fill="#74c6bb" font-family="Manrope, sans-serif" font-size="13" font-weight="800">4</text>
    <text x="556" y="220" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="26">Tasks</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="694" y="150" width="212" height="104" rx="20" fill="url(#panel)" stroke="#314052" />
    <text x="718" y="188" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="13" font-weight="800">5</text>
    <text x="718" y="220" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="26">Screenshots and notes</text>
  </g>
  <path d="M194 202 H214" stroke="#d2b27a" stroke-width="6" stroke-linecap="round" />
  <path d="M354 202 H374" stroke="#74c6bb" stroke-width="6" stroke-linecap="round" />
  <path d="M514 202 H534" stroke="#d2b27a" stroke-width="6" stroke-linecap="round" />
  <path d="M674 202 H694" stroke="#74c6bb" stroke-width="6" stroke-linecap="round" />
  <g filter="url(#shadow)">
    <rect x="112" y="326" width="736" height="138" rx="24" fill="#121925" stroke="#304051" />
    <text x="144" y="366" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="14" font-weight="800">KEY RULE</text>
    <text x="144" y="400" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="30">The value is the process, not the click count</text>
    <text x="144" y="434" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="15">Date your assumptions, re-check network docs, and keep a clean record of every interaction.</text>
  </g>
</svg>
