<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Device hygiene stack</title>
  <desc id="desc">A dark themed device hygiene diagram showing the layered controls around browser profiles, extensions, updates, and exposure reduction.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101620" />
      <stop offset="100%" stop-color="#090d14" />
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#171f2b" />
      <stop offset="100%" stop-color="#0d131c" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>
  <rect width="960" height="540" rx="32" fill="url(#bg)" />
  <text x="54" y="70" fill="#f3efe6" font-family="Manrope, sans-serif" font-size="24" font-weight="800">Device Hygiene Stack</text>
  <text x="54" y="102" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="16">Browser separation - extension audit - updates - exposure control</text>
  <g filter="url(#shadow)">
    <rect x="118" y="146" width="724" height="76" rx="20" fill="url(#panel)" stroke="#304051" />
    <text x="152" y="192" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="14" font-weight="800">LAYER 1</text>
    <text x="264" y="192" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="30">Use a cleaner browser profile for finance and wallet actions</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="148" y="240" width="664" height="76" rx="20" fill="url(#panel)" stroke="#304051" />
    <text x="182" y="286" fill="#74c6bb" font-family="Manrope, sans-serif" font-size="14" font-weight="800">LAYER 2</text>
    <text x="294" y="286" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="30">Remove unnecessary extensions and review permissions</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="178" y="334" width="604" height="76" rx="20" fill="url(#panel)" stroke="#304051" />
    <text x="212" y="380" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="14" font-weight="800">LAYER 3</text>
    <text x="324" y="380" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="30">Keep the device, browser, and security tools updated</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="208" y="428" width="544" height="64" rx="20" fill="url(#panel)" stroke="#304051" />
    <text x="242" y="468" fill="#74c6bb" font-family="Manrope, sans-serif" font-size="14" font-weight="800">LAYER 4</text>
    <text x="354" y="468" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="28">Limit shared-device or random-link exposure</text>
  </g>
</svg>
