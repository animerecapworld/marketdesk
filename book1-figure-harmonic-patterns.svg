  <rect x="108" y="478" width="762" height="42" rx="14" fill="#f3ebdb" stroke="#d8ccb8" />
  <text x="136" y="505" fill="#5f5648" font-family="Arial, sans-serif" font-size="17">The label is only useful if the completion area is clear enough to trade with defined risk.</text>
