  <text x="88" y="154" fill="#6c645a" font-family="Arial, sans-serif" font-size="20">Harmonic labels try to organize proportional swings and completion zones.</text>

  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="108" y="224" width="330" height="212" rx="20" fill="#faf6ee" stroke="#d8ccb8" stroke-width="2.5" />
