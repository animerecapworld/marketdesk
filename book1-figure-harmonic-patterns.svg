    <text x="214" y="256" fill="#b79156" font-size="18">B</text>
    <text x="290" y="362" fill="#b79156" font-size="18">C</text>
    <text x="366" y="220" fill="#b79156" font-size="18">D</text>
    <text x="273" y="414" fill="#5e5448" font-size="20">ABCD</text>

    <rect x="540" y="224" width="330" height="212" rx="20" fill="#faf6ee" stroke="#d8ccb8" stroke-width="2.5" />
    <path d="M572 318 634 246 698 332 762 266 826 364" fill="none" stroke="#2f5260" stroke-width="5" />
