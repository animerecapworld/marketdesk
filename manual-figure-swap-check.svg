<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Swap review ladder</title>
  <desc id="desc">A dark themed swap review diagram showing pair selection, quote review, slippage awareness, and final confirmation checks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101620" />
      <stop offset="100%" stop-color="#090d14" />
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#171f2b" />
      <stop offset="100%" stop-color="#0d131c" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>
  <rect width="960" height="540" rx="32" fill="url(#bg)" />
  <text x="54" y="70" fill="#f3efe6" font-family="Manrope, sans-serif" font-size="24" font-weight="800">Swap Review Ladder</text>
  <text x="54" y="102" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="16">Pair choice - quote review - slippage - final prompt</text>
  <g filter="url(#shadow)">
    <rect x="64" y="154" width="192" height="126" rx="22" fill="url(#panel)" stroke="#304051" />
    <text x="88" y="194" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="14" font-weight="800">STEP 1</text>
    <text x="88" y="228" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="30">Choose the pair</text>
    <text x="88" y="260" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="14">Sell token, buy token, and contract identity must all match the plan.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="284" y="154" width="192" height="126" rx="22" fill="url(#panel)" stroke="#304051" />
    <text x="308" y="194" fill="#74c6bb" font-family="Manrope, sans-serif" font-size="14" font-weight="800">STEP 2</text>
    <text x="308" y="228" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="30">Read the quote</text>
    <text x="308" y="260" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="14">Look at amount out, price impact, route quality, and fees before continuing.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="504" y="154" width="192" height="126" rx="22" fill="url(#panel)" stroke="#304051" />
    <text x="528" y="194" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="14" font-weight="800">STEP 3</text>
    <text x="528" y="228" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="30">Watch slippage</text>
    <text x="528" y="260" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="14">Wide tolerance may rescue execution, but it can also worsen the fill fast.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="724" y="154" width="172" height="126" rx="22" fill="url(#panel)" stroke="#304051" />
    <text x="748" y="194" fill="#74c6bb" font-family="Manrope, sans-serif" font-size="14" font-weight="800">STEP 4</text>
    <text x="748" y="228" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="30">Confirm slowly</text>
    <text x="748" y="260" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="14">The last prompt is where rushed users miss the real risk.</text>
  </g>
  <path d="M256 216 H284 M476 216 H504 M696 216 H724" stroke="#d2b27a" stroke-width="6" stroke-linecap="round" />
  <g filter="url(#shadow)">
    <rect x="86" y="344" width="788" height="128" rx="24" fill="#121925" stroke="#304051" />
    <text x="120" y="384" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="14" font-weight="800">CHECKPOINT</text>
    <text x="120" y="418" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="30">A swap is easy only after the review is complete</text>
    <text x="120" y="452" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="15">The interface feels simple because it compresses several risk decisions into one button.</text>
  </g>
</svg>
