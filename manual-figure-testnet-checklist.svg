<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Testnet source and faucet checklist</title>
  <desc id="desc">A dark themed diagram showing the basic testnet workflow: read docs, label the wallet, use the right faucet or bridge, and record the step.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101620" />
      <stop offset="100%" stop-color="#090d14" />
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#171f2b" />
      <stop offset="100%" stop-color="#0d131c" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>
  <rect width="960" height="540" rx="32" fill="url(#bg)" />
  <text x="54" y="70" fill="#f3efe6" font-family="Manrope, sans-serif" font-size="24" font-weight="800">Testnet Source Checklist</text>
  <text x="54" y="102" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="16">Docs first - labeled wallet - faucet or bridge - recorded proof</text>
  <g filter="url(#shadow)">
    <rect x="62" y="156" width="202" height="132" rx="22" fill="url(#panel)" stroke="#304051" />
    <text x="88" y="194" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="14" font-weight="800">STEP 1</text>
    <text x="88" y="228" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="30">Open docs</text>
    <text x="88" y="260" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="14">Start with current project documentation, not community shortcuts.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="286" y="156" width="202" height="132" rx="22" fill="url(#panel)" stroke="#304051" />
    <text x="312" y="194" fill="#74c6bb" font-family="Manrope, sans-serif" font-size="14" font-weight="800">STEP 2</text>
    <text x="312" y="228" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="30">Label wallet</text>
    <text x="312" y="260" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="14">Keep the test wallet clearly separated from any storage workflow.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="510" y="156" width="202" height="132" rx="22" fill="url(#panel)" stroke="#304051" />
    <text x="536" y="194" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="14" font-weight="800">STEP 3</text>
    <text x="536" y="228" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="30">Use right tool</text>
    <text x="536" y="260" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="14">Match the faucet or bridge to the exact chain and task you are doing.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="734" y="156" width="164" height="132" rx="22" fill="url(#panel)" stroke="#304051" />
    <text x="758" y="194" fill="#74c6bb" font-family="Manrope, sans-serif" font-size="14" font-weight="800">STEP 4</text>
    <text x="758" y="228" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="30">Log it</text>
    <text x="758" y="260" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="14">Record the task date, screenshot, and wallet used.</text>
  </g>
  <path d="M264 220 H286 M488 220 H510 M712 220 H734" stroke="#d2b27a" stroke-width="6" stroke-linecap="round" />
  <g filter="url(#shadow)">
    <rect x="112" y="352" width="736" height="116" rx="24" fill="#121925" stroke="#304051" />
    <text x="146" y="390" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="14" font-weight="800">POINT OF THE CHECKLIST</text>
    <text x="146" y="424" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="30">Testnet value is in disciplined practice, not random clicking</text>
    <text x="146" y="456" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="15">The cleaner the record and source path, the easier the later follow-up becomes.</text>
  </g>
</svg>
