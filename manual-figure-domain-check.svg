<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Domain verification ladder</title>
  <desc id="desc">A dark themed diagram showing the safe path for domain verification: official source, saved bookmark, full domain review, and action only after matching details.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101620" />
      <stop offset="100%" stop-color="#090d14" />
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#171f2b" />
      <stop offset="100%" stop-color="#0d131c" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>
  <rect width="960" height="540" rx="32" fill="url(#bg)" />
  <text x="54" y="70" fill="#f3efe6" font-family="Manrope, sans-serif" font-size="24" font-weight="800">Domain Verification Ladder</text>
  <text x="54" y="102" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="16">Official source - saved path - full address check - act only after matching</text>
  <g filter="url(#shadow)">
    <rect x="74" y="152" width="182" height="210" rx="22" fill="url(#panel)" stroke="#304051" />
    <text x="98" y="190" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="14" font-weight="800">STEP 1</text>
    <text x="98" y="224" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="28">Start official</text>
    <text x="98" y="258" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="14">Begin from the verified site or help center, not a reply or private message.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="286" y="152" width="182" height="210" rx="22" fill="url(#panel)" stroke="#304051" />
    <text x="310" y="190" fill="#74c6bb" font-family="Manrope, sans-serif" font-size="14" font-weight="800">STEP 2</text>
    <text x="310" y="224" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="28">Use bookmarks</text>
    <text x="310" y="258" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="14">Return through a saved path when possible instead of trusting memory.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="498" y="152" width="182" height="210" rx="22" fill="url(#panel)" stroke="#304051" />
    <text x="522" y="190" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="14" font-weight="800">STEP 3</text>
    <text x="522" y="224" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="28">Read the full URL</text>
    <text x="522" y="258" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="14">Check the exact domain before any login, connection, or download.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="710" y="152" width="176" height="210" rx="22" fill="url(#panel)" stroke="#304051" />
    <text x="734" y="190" fill="#74c6bb" font-family="Manrope, sans-serif" font-size="14" font-weight="800">STEP 4</text>
    <text x="734" y="224" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="28">Only then act</text>
    <text x="734" y="258" fill="#a4adbc" font-family="Manrope, sans-serif" font-size="14">If anything differs, stop first and verify again from the source.</text>
  </g>
  <path d="M256 218 H286 M468 218 H498 M680 218 H710" stroke="#d2b27a" stroke-width="6" stroke-linecap="round" />
  <g filter="url(#shadow)">
    <rect x="86" y="392" width="788" height="92" rx="22" fill="#121925" stroke="#304051" />
    <text x="120" y="430" fill="#d2b27a" font-family="Manrope, sans-serif" font-size="14" font-weight="800">TRAP TO AVOID</text>
    <text x="120" y="462" fill="#f3efe6" font-family="Cormorant Garamond, serif" font-size="28">A convincing page design is not proof of a real domain</text>
  </g>
</svg>
